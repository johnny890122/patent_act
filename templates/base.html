<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="專利法 AI 刷題助手 - 台灣專利法考試準備工具">
    <title>{% block title %}專利法 AI 刷題助手{% endblock %}</title>
    
    <!-- MUI CSS Framework -->
    <link href="https://cdn.muicss.com/mui-0.10.3/css/mui.min.css" rel="stylesheet" type="text/css" />
    
    <!-- Design System Tokens -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo" title="專利法刷題">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">首頁</a>
                <a href="/laws" class="nav-link {% if request.path.startswith('/laws') %}active{% endif %}">法條瀏覽</a>
            </nav>
            <!-- Law Type Selector (direct child for mobile row-2 placement) -->
            <div class="law-type-selector">
                {% set current_law_type = session.get('current_law_type', 'patent-act') %}
                <select id="law-type-select" class="law-type-select" title="選擇法律類型">
                    <!-- Options will be dynamically loaded by JavaScript -->
                    <option value="">載入中...</option>
                </select>
            </div>
            <div class="header-right">
                <div class="lang-toggle">
                    <button id="lang-zh" class="lang-btn active" data-lang="zh-TW" title="切換到中文">中</button>
                    <button id="lang-en" class="lang-btn" data-lang="en" title="Switch to English">EN</button>
                </div>
                <div class="user-menu">
                    <span id="user-display-name" class="user-name">載入中...</span>
                    <button id="logout-btn" class="btn-logout" title="登出">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- MUI JavaScript -->
    <script src="https://cdn.muicss.com/mui-0.10.3/js/mui.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
