<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="專利法 AI 刷題助手 - 台灣專利法考試準備工具">
    <title>{% block title %}專利法 AI 刷題助手{% endblock %}</title>
    
    <!-- MUI CSS Framework -->
    <link href="https://cdn.muicss.com/mui-0.10.3/css/mui.min.css" rel="stylesheet" type="text/css" />
    
    <!-- Design System Tokens -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">📚 專利法刷題</a>
            <nav class="nav">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">首頁</a>
                <a href="/laws" class="nav-link {% if request.path.startswith('/laws') %}active{% endif %}">法條瀏覽</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- MUI JavaScript -->
    <script src="https://cdn.muicss.com/mui-0.10.3/js/mui.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
