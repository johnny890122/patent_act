{% extends "base.html" %}

{% block title %}法條詳情 - 專利法 AI 刷題助手{% endblock %}

{% block content %}
<div class="container">
    <!-- Back Button -->
    <div style="margin-bottom: 1rem;">
        <a href="/laws" class="btn btn-secondary">
            ← 返回法條列表
        </a>
    </div>

    <!-- Loading State -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p class="loading-text">載入中...</p>
    </div>

    <!-- Error State -->
    <div id="error-state" class="card" style="display: none;">
        <h2 style="color: var(--error-color);">⚠️ 載入失敗</h2>
        <p id="error-message">無法載入法條資料</p>
        <a href="/laws" class="btn btn-primary">返回法條列表</a>
    </div>

    <!-- Law Detail Card -->
    <div id="law-detail" style="display: none;">
        <!-- Law Info Card -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem;">
                <div style="flex: 1;">
                    <h1 class="card-title" id="law-article" style="margin-bottom: 0.25rem;">載入中...</h1>
                    <p class="card-subtitle" id="law-chapter" style="margin-bottom: 0.5rem;">載入中...</p>
                    <!-- Compact Statistics -->
                    <div class="law-stats-compact">
                        <span class="stat-badge">
                            <span class="stat-icon">📊</span>
                            <span id="attempt-count">0</span> 次作答
                        </span>
                        <span class="stat-separator">·</span>
                        <span class="stat-badge">
                            <span class="stat-icon">✓</span>
                            平均 <span id="avg-score">0.0</span>
                        </span>
                    </div>
                </div>
                <button
                    id="star-btn"
                    class="btn btn-outline"
                    style="font-size: 1.5rem; padding: 0.5rem 1rem;"
                    title="收藏此法條"
                >
                    ☆
                </button>
            </div>
            
            <div class="law-content" id="law-content">
                載入中...
            </div>
        </div>

        <!-- Questions History Card -->
        <div class="card">
            <h2 class="card-title">📝 相關題目</h2>
            
            <!-- Filter Tabs -->
            <div class="filter-tabs" style="margin: 1rem 0;">
                <button class="filter-tab active" data-filter="all">
                    全部 (<span id="count-all">0</span>)
                </button>
                <button class="filter-tab" data-filter="MCQ">
                    選擇題 (<span id="count-mcq">0</span>)
                </button>
                <button class="filter-tab" data-filter="ShortAnswer">
                    簡答題 (<span id="count-short">0</span>)
                </button>
                <button class="filter-tab" data-filter="starred">
                    已收藏 (<span id="count-starred">0</span>)
                </button>
                <button class="filter-tab" data-filter="marked-wrong">
                    答錯題 (<span id="count-wrong">0</span>)
                </button>
                <button class="filter-tab" data-filter="deleted">
                    已刪除 (<span id="count-deleted">0</span>)
                </button>
            </div>
            
            <!-- Questions List -->
            <div id="questions-list">
                <!-- Questions will be loaded here -->
            </div>
            
            <!-- Pagination -->
            <div id="questions-pagination" class="pagination" style="display: none;">
                <button class="pagination-btn" id="prev-page-btn" disabled>← 上一頁</button>
                <span class="pagination-info" id="page-info">第 1 頁 / 共 1 頁</span>
                <button class="pagination-btn" id="next-page-btn">下一頁 →</button>
            </div>
            
            <!-- Empty State -->
            <div id="questions-empty" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <div class="empty-state-title">尚無相關題目</div>
                <p class="empty-state-text">此法條還沒有生成過題目</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const lawId = "{{ law_id }}";
    let lawData = null;
    let questions = [];
    let currentFilter = 'all';
    let currentPage = 1;
    const questionsPerPage = 10;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadLawDetail();
        setupEventListeners();
    });
    
    // Setup event listeners
    function setupEventListeners() {
        // Star button
        document.getElementById('star-btn').addEventListener('click', toggleStar);
        
        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const filter = e.target.dataset.filter;
                setFilter(filter);
            });
        });
        
        // Pagination buttons
        document.getElementById('prev-page-btn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderQuestions();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        
        document.getElementById('next-page-btn').addEventListener('click', () => {
            const filteredQuestions = getFilteredQuestions();
            const totalPages = Math.ceil(filteredQuestions.length / questionsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderQuestions();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }
    
    // Load law detail
    async function loadLawDetail() {
        try {
            // Fetch law data
            const lawResponse = await window.appUtils.apiCall(`/api/laws/${lawId}`);
            lawData = lawResponse;
            
            // Fetch questions for this law
            const questionsResponse = await window.appUtils.apiCall(`/api/laws/${lawId}/questions`);
            questions = questionsResponse.questions || [];
            
            // Sort by _id (which contains timestamp) - newest first
            questions.sort((a, b) => b._id.localeCompare(a._id));
            
            // Render law detail
            renderLawDetail();
            
            // Render questions
            renderQuestions();
            
            // Hide loading, show content
            document.getElementById('loading').style.display = 'none';
            document.getElementById('law-detail').style.display = 'block';
            
        } catch (error) {
            console.error('Error loading law detail:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            document.getElementById('error-message').textContent = error.message || '無法載入法條資料';
        }
    }
    
    // Format law content with line breaks for numbered items
    function formatLawContent(content) {
        // Replace pattern " 數字 空格" with line break, except for the first one
        // Pattern: one space + digit(s) + one space
        return content.replace(/\s+(\d+)\s+/g, (match, digit, offset) => {
            // Don't add line break if it's at the beginning
            if (offset === 0) {
                return match;
            }
            return '<br>' + digit + ' ';
        });
    }

    // Render law detail
    function renderLawDetail() {
        document.getElementById('law-article').textContent = `${lawData.article_number}`;
        document.getElementById('law-chapter').textContent = lawData.chapter;
        
        // Format and display content with line breaks
        const formattedContent = formatLawContent(lawData.content);
        document.getElementById('law-content').innerHTML = formattedContent;
        
        // Update star button
        const starBtn = document.getElementById('star-btn');
        starBtn.textContent = lawData.is_starred ? '★' : '☆';
        starBtn.style.color = lawData.is_starred ? 'var(--warning-color)' : '';
        
        // Update statistics (only show if there are attempts)
        const statsContainer = document.querySelector('.law-stats-compact');
        if (lawData.attempt_count && lawData.attempt_count > 0) {
            document.getElementById('attempt-count').textContent = lawData.attempt_count;
            
            // Calculate accuracy percentage
            let accuracyPercent = '-';
            let accuracyClass = '';
            if (lawData.avg_score !== null && lawData.avg_score !== undefined) {
                accuracyPercent = Math.round(lawData.avg_score * 100);
                accuracyClass = accuracyPercent < 70 ? 'low-accuracy' : '';
            }
            
            const avgScoreEl = document.getElementById('avg-score');
            avgScoreEl.textContent = accuracyPercent === '-' ? '-' : `${accuracyPercent}%`;
            avgScoreEl.className = accuracyClass;
            
            statsContainer.style.display = 'flex';
        } else {
            statsContainer.style.display = 'none';
        }
    }
    
    // Get filtered questions based on current filter
    function getFilteredQuestions() {
        if (currentFilter === 'deleted') {
            return questions.filter(q => q.is_deleted);
        } else if (currentFilter === 'starred') {
            return questions.filter(q => q.is_starred && !q.is_deleted);
        } else if (currentFilter === 'marked-wrong') {
            return questions.filter(q => q.is_marked_wrong && !q.is_deleted);
        } else if (currentFilter !== 'all') {
            return questions.filter(q => q.type === currentFilter && !q.is_deleted);
        } else {
            return questions.filter(q => !q.is_deleted);
        }
    }
    
    // Render questions
    function renderQuestions() {
        // Update counts
        const allCount = questions.filter(q => !q.is_deleted).length;
        const mcqCount = questions.filter(q => q.type === 'MCQ' && !q.is_deleted).length;
        const shortCount = questions.filter(q => q.type === 'ShortAnswer' && !q.is_deleted).length;
        const starredCount = questions.filter(q => q.is_starred && !q.is_deleted).length;
        const wrongCount = questions.filter(q => q.is_marked_wrong && !q.is_deleted).length;
        const deletedCount = questions.filter(q => q.is_deleted).length;
        
        document.getElementById('count-all').textContent = allCount;
        document.getElementById('count-mcq').textContent = mcqCount;
        document.getElementById('count-short').textContent = shortCount;
        document.getElementById('count-starred').textContent = starredCount;
        document.getElementById('count-wrong').textContent = wrongCount;
        document.getElementById('count-deleted').textContent = deletedCount;
        
        // Filter questions
        const filteredQuestions = getFilteredQuestions();
        
        // Calculate pagination
        const totalPages = Math.ceil(filteredQuestions.length / questionsPerPage);
        const startIdx = (currentPage - 1) * questionsPerPage;
        const endIdx = startIdx + questionsPerPage;
        const paginatedQuestions = filteredQuestions.slice(startIdx, endIdx);
        
        // Render
        const listEl = document.getElementById('questions-list');
        const emptyEl = document.getElementById('questions-empty');
        const paginationEl = document.getElementById('questions-pagination');
        const prevBtn = document.getElementById('prev-page-btn');
        const nextBtn = document.getElementById('next-page-btn');
        const pageInfo = document.getElementById('page-info');
        
        if (filteredQuestions.length === 0) {
            listEl.style.display = 'none';
            emptyEl.style.display = 'block';
            paginationEl.style.display = 'none';
        } else {
            listEl.style.display = 'block';
            emptyEl.style.display = 'none';
            
            // Update pagination controls
            if (totalPages > 1) {
                paginationEl.style.display = 'flex';
                pageInfo.textContent = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            } else {
                paginationEl.style.display = 'none';
            }
            
            listEl.innerHTML = paginatedQuestions.map((q, index) => `
                <div class="question-item ${q.is_deleted ? 'deleted' : ''}" style="
                    border: 1px solid var(--border-color);
                    border-radius: 0.5rem;
                    padding: 1rem;
                    margin-bottom: 1rem;
                    ${q.is_deleted ? 'opacity: 0.6; background-color: var(--bg-color);' : ''}
                ">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                            <span class="question-type-badge ${q.type === 'MCQ' ? 'badge-mcq' : 'badge-short'}" style="
                                display: inline-block;
                                padding: 0.25rem 0.75rem;
                                border-radius: 1rem;
                                font-size: 0.875rem;
                                font-weight: 500;
                            ">
                                ${q.type === 'MCQ' ? '選擇題' : '簡答題'}
                            </span>
                            ${q.is_deleted ? '<span style="color: var(--danger-color); margin-left: 0.5rem;">🗑️ 已刪除</span>' : ''}
                            ${!q.is_deleted && q.is_marked_wrong ? `
                                <span style="color: var(--danger-color); font-size: 0.875rem; font-weight: 500;">
                                    ✗ 答錯 (${Math.round((q.last_score || 0) * 100)}%)
                                </span>
                            ` : ''}
                            ${!q.is_deleted && !q.is_marked_wrong && q.last_score !== undefined ? `
                                <span style="color: var(--success-color); font-size: 0.875rem;">
                                    ✓ ${Math.round(q.last_score * 100)}%
                                </span>
                            ` : ''}
                        </div>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <span style="color: var(--text-secondary); font-size: 0.875rem;">
                                #${startIdx + index + 1}
                            </span>
                            ${!q.is_deleted ? `
                                <button
                                    class="btn-icon-small"
                                    onclick="toggleQuestionStar('${q._id}')"
                                    title="${q.is_starred ? '取消收藏' : '收藏題目'}"
                                    style="color: ${q.is_starred ? 'var(--warning-color)' : 'var(--text-secondary)'};"
                                >
                                    ${q.is_starred ? '★' : '☆'}
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    <div style="margin-bottom: 0.75rem; color: var(--text-primary);">
                        ${q.content}
                    </div>
                    ${q.type === 'MCQ' && q.options ? `
                        <div style="margin-bottom: 0.75rem; display: flex; flex-direction: column; gap: 0.25rem;">
                            ${q.options.map((opt, i) => `
                                <div style="padding: 0.5rem; background: var(--bg-color); border-radius: 0.25rem; font-size: 0.875rem;">
                                    ${opt}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <div style="padding: 0.75rem; background: rgba(16, 185, 129, 0.1); border-left: 3px solid var(--success-color); border-radius: 0.25rem; margin-bottom: 0.5rem;">
                        <div style="font-weight: 500; color: var(--success-color); margin-bottom: 0.25rem; font-size: 0.875rem;">
                            ✓ 正確答案
                        </div>
                        <div style="font-size: 0.875rem;">
                            ${q.correct_answer}
                        </div>
                    </div>
                    <details style="margin-top: 0.75rem;">
                        <summary style="cursor: pointer; color: var(--primary-color); font-weight: 500; font-size: 0.875rem;">
                            💡 查看解析
                        </summary>
                        <div style="margin-top: 0.5rem; padding: 0.75rem; background: var(--bg-color); border-radius: 0.25rem; font-size: 0.875rem; color: var(--text-secondary);">
                            ${q.ai_explanation}
                        </div>
                    </details>
                </div>
            `).join('');
        }
    }
    
    // Set filter
    function setFilter(filter) {
        currentFilter = filter;
        currentPage = 1; // Reset to first page when filter changes
        
        // Update active tab
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.remove('active');
            if (tab.dataset.filter === filter) {
                tab.classList.add('active');
            }
        });
        
        // Re-render questions
        renderQuestions();
    }
    
    // Toggle star
    async function toggleStar() {
        try {
            const response = await window.appUtils.apiCall(
                `/api/laws/${lawId}/star`,
                { method: 'PUT' }
            );
            
            lawData.is_starred = response.is_starred;
            
            // Update button
            const starBtn = document.getElementById('star-btn');
            starBtn.textContent = lawData.is_starred ? '★' : '☆';
            starBtn.style.color = lawData.is_starred ? 'var(--warning-color)' : '';
            
            window.appUtils.showToast(response.message, 'success');
            
        } catch (error) {
            console.error('Error toggling star:', error);
            window.appUtils.showToast('操作失敗', 'error');
        }
    }
    
    // Toggle question star status
    async function toggleQuestionStar(questionId) {
        try {
            const response = await window.appUtils.apiCall(
                `/api/questions/${questionId}/star`,
                { method: 'PUT' }
            );
            
            // Update local data
            const question = questions.find(q => q._id === questionId);
            if (question) {
                question.is_starred = response.is_starred;
            }
            
            // Re-render
            renderQuestions();
            
            window.appUtils.showToast(response.message, 'success');
            
        } catch (error) {
            console.error('Error toggling question star:', error);
            window.appUtils.showToast('操作失敗', 'error');
        }
    }
    
    // 答錯標記改為自動判斷（根據 last_score < 0.7）
    // 不再需要手動切換功能
</script>
{% endblock %}
